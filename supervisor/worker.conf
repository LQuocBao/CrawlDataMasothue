;=============================================================================
; Supervisor Configuration for Laravel Queue Workers (Production)
;
; This ensures queue workers are always running and automatically restart
; if they crash. Deploy this to /etc/supervisor/conf.d/ on your VPS.
;
; Reload: sudo supervisorctl reread && sudo supervisorctl update
; Status: sudo supervisorctl status
;=============================================================================

[supervisord]
nodaemon=true
user=root
logfile=/var/log/supervisord.log
pidfile=/var/run/supervisord.pid

;─── Notification Queue Worker ─────────────────────────────────────────────
; Handles PDF generation and Telegram API calls.
; Multiple processes for throughput; each picks one job at a time.
[program:queue-notifications]
process_name=%(program_name)s_%(process_num)02d
command=php /var/www/artisan queue:work redis --queue=notifications --sleep=2 --tries=3 --max-time=3600 --max-jobs=500 --memory=256
autostart=true
autorestart=true
stopasgroup=true
killasgroup=true
user=www-data
numprocs=3
redirect_stderr=true
stdout_logfile=/var/www/storage/logs/worker-notifications.log
stdout_logfile_maxbytes=10MB
stdout_logfile_backups=5
stopwaitsecs=30
startsecs=5

;─── Default Queue Worker ──────────────────────────────────────────────────
; Handles any remaining lower-priority jobs.
[program:queue-default]
process_name=%(program_name)s_%(process_num)02d
command=php /var/www/artisan queue:work redis --queue=default --sleep=3 --tries=3 --max-time=3600 --max-jobs=1000 --memory=128
autostart=true
autorestart=true
stopasgroup=true
killasgroup=true
user=www-data
numprocs=1
redirect_stderr=true
stdout_logfile=/var/www/storage/logs/worker-default.log
stdout_logfile_maxbytes=10MB
stdout_logfile_backups=3
stopwaitsecs=30
startsecs=5
