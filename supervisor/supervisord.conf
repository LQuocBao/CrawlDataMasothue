;=============================================================================
; Main Supervisor Configuration (for VPS standalone deployment)
;
; If running without Docker, install: sudo apt install supervisor
; Place this at: /etc/supervisor/supervisord.conf
; Worker configs go to: /etc/supervisor/conf.d/
;=============================================================================

[unix_http_server]
file=/var/run/supervisor.sock
chmod=0700

[supervisord]
logfile=/var/log/supervisor/supervisord.log
pidfile=/var/run/supervisord.pid
childlogdir=/var/log/supervisor
nodaemon=false
minfds=1024
minprocs=200
user=root

[rpcinterface:supervisor]
supervisor.rpcinterface_factory = supervisor.rpcinterface:make_main_rpcinterface

[supervisorctl]
serverurl=unix:///var/run/supervisor.sock

[include]
files = /etc/supervisor/conf.d/*.conf
