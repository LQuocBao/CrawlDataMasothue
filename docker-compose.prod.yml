#=============================================================================
# PRODUCTION Docker Compose
# Deploy with: docker compose -f docker-compose.prod.yml up -d
#=============================================================================

services:
  # ─── Laravel Backend (Production) ───────────────────────────────────────
  app:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: production
    container_name: mst-app-prod
    restart: always
    working_dir: /var/www
    environment:
      - APP_ENV=production
      - APP_DEBUG=false
      - DB_HOST=mysql
      - REDIS_HOST=redis
      - QUEUE_CONNECTION=redis
      - CACHE_DRIVER=redis
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - mst-network
    ports:
      - "8000:9000"
    # Production uses PHP-FPM, fronted by Nginx

  # ─── Nginx Reverse Proxy ────────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: mst-nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./backend/public:/var/www/public:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - app
      - frontend
    networks:
      - mst-network

  # ─── Queue Workers (via Supervisor inside container) ─────────────────────
  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: production
    container_name: mst-worker-prod
    restart: always
    working_dir: /var/www
    environment:
      - APP_ENV=production
      - DB_HOST=mysql
      - REDIS_HOST=redis
      - QUEUE_CONNECTION=redis
      - CACHE_DRIVER=redis
    depends_on:
      - app
    networks:
      - mst-network
    volumes:
      - ./supervisor/worker.conf:/etc/supervisor/supervisord.conf:ro
    command: supervisord -c /etc/supervisor/supervisord.conf

  # ─── Scheduler ──────────────────────────────────────────────────────────
  scheduler:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: production
    container_name: mst-scheduler-prod
    restart: always
    working_dir: /var/www
    environment:
      - APP_ENV=production
      - DB_HOST=mysql
      - REDIS_HOST=redis
      - QUEUE_CONNECTION=redis
      - CACHE_DRIVER=redis
    depends_on:
      - app
    networks:
      - mst-network
    command: >
      sh -c "while true; do php artisan schedule:run --no-interaction; sleep 60; done"

  # ─── Next.js Frontend (Production) ──────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: production
    container_name: mst-frontend-prod
    restart: always
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=https://api.your-domain.com
      - NODE_ENV=production
    networks:
      - mst-network

  # ─── MySQL (Production) ─────────────────────────────────────────────────
  mysql:
    image: mysql:8.0
    container_name: mst-mysql-prod
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MYSQL_DATABASE: masothue_scraper
      MYSQL_USER: ${DB_USERNAME}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    volumes:
      - mysql-data-prod:/var/lib/mysql
      - ./mysql/conf.d:/etc/mysql/conf.d:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - mst-network
    # No exposed ports in production (internal only)

  # ─── Redis (Production) ─────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: mst-redis-prod
    restart: always
    command: redis-server --requirepass ${REDIS_PASSWORD} --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis-data-prod:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - mst-network

volumes:
  mysql-data-prod:
  redis-data-prod:

networks:
  mst-network:
    driver: bridge
