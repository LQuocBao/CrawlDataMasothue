#=============================================================================
# DEVELOPMENT Docker Compose
# Start with: docker compose up -d
#=============================================================================

services:
  # ─── Laravel Backend ─────────────────────────────────────────────────────
  app:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: development
    container_name: mst-app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - ./backend:/var/www
      - ./backend/storage/app/pdfs:/var/www/storage/app/pdfs
    ports:
      - "8000:8000"
    environment:
      - APP_ENV=local
      - APP_DEBUG=true
      - DB_HOST=mysql
      - REDIS_HOST=redis
      - QUEUE_CONNECTION=database
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - mst-network
    command: php artisan serve --host=0.0.0.0 --port=8000

  # ─── Queue Worker (dev uses database driver) ─────────────────────────────
  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: development
    container_name: mst-worker
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - ./backend:/var/www
    environment:
      - APP_ENV=local
      - DB_HOST=mysql
      - REDIS_HOST=redis
      - QUEUE_CONNECTION=database
    depends_on:
      - app
    networks:
      - mst-network
    command: php artisan queue:work database --queue=notifications,default --sleep=3 --tries=3 --max-time=3600

  # ─── Scheduler (triggers scrape every 1-2 min) ──────────────────────────
  scheduler:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: development
    container_name: mst-scheduler
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - ./backend:/var/www
    environment:
      - APP_ENV=local
      - DB_HOST=mysql
      - REDIS_HOST=redis
      - QUEUE_CONNECTION=database
    depends_on:
      - app
    networks:
      - mst-network
    command: >
      sh -c "while true; do php artisan schedule:run --verbose --no-interaction; sleep 60; done"

  # ─── Next.js Frontend ────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: development
    container_name: mst-frontend
    restart: unless-stopped
    working_dir: /app
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    depends_on:
      - app
    networks:
      - mst-network
    command: npm run dev

  # ─── MySQL ──────────────────────────────────────────────────────────────
  mysql:
    image: mysql:8.0
    container_name: mst-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: secret
      MYSQL_DATABASE: masothue_scraper
      MYSQL_USER: scraper
      MYSQL_PASSWORD: scraper_pass
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - mst-network

  # ─── Redis ──────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: mst-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - mst-network

volumes:
  mysql-data:
  redis-data:

networks:
  mst-network:
    driver: bridge
