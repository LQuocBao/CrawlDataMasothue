#=============================================================================
# LOCAL DEV - Kiến trúc Bus::chain + Queue Workers
#=============================================================================

services:
  # ─── Laravel API ─────────────────────────────────────────────────────────
  app:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: development
    container_name: mst-app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - ./backend:/var/www
    ports:
      - "8000:8000"
    environment:
      - APP_ENV=local
      - APP_DEBUG=true
      - DB_HOST=mysql
      - REDIS_HOST=redis
      - QUEUE_CONNECTION=redis
      - CACHE_DRIVER=redis
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - mst-network
    command: php artisan serve --host=0.0.0.0 --port=8000

  # ─── Worker: Scraping Queue (chain tuần tự) ──────────────────────────────
  worker-scraping:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: development
    container_name: mst-worker-scraping
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - ./backend:/var/www
    environment:
      - APP_ENV=local
      - DB_HOST=mysql
      - REDIS_HOST=redis
      - QUEUE_CONNECTION=redis
      - CACHE_DRIVER=redis
    depends_on:
      - app
    networks:
      - mst-network
    command: php artisan queue:work redis --queue=scraping --sleep=2 --tries=2 --max-time=3600 --memory=256

  # ─── Worker: Notifications Queue (PDF + Telegram, song song) ─────────────
  worker-notifications:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: development
    container_name: mst-worker-notifications
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - ./backend:/var/www
    environment:
      - APP_ENV=local
      - DB_HOST=mysql
      - REDIS_HOST=redis
      - QUEUE_CONNECTION=redis
      - CACHE_DRIVER=redis
    depends_on:
      - app
    networks:
      - mst-network
    command: php artisan queue:work redis --queue=notifications --sleep=1 --tries=3 --max-time=3600 --memory=256

  # ─── Scheduler (Laravel Task Scheduling) ─────────────────────────────────
  scheduler:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: development
    container_name: mst-scheduler
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - ./backend:/var/www
    environment:
      - APP_ENV=local
      - DB_HOST=mysql
      - REDIS_HOST=redis
      - QUEUE_CONNECTION=redis
      - CACHE_DRIVER=redis
    depends_on:
      - app
    networks:
      - mst-network
    command: sh -c "while true; do php artisan schedule:run --no-interaction; sleep 60; done"

  # ─── Next.js Frontend ────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: development
    container_name: mst-frontend
    restart: unless-stopped
    working_dir: /app
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://14.225.205.98:8000
      - NEXT_PUBLIC_EXTENSION_SECRET=fR3ahTiZb6L2jeIrnocyQ7EDklpwM8YVKFNA4uW0UJqt9OzH
    depends_on:
      - app
    networks:
      - mst-network
    command: npm run dev

  # ─── MySQL ──────────────────────────────────────────────────────────────
  mysql:
    image: mysql:8.0
    container_name: mst-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: secret
      MYSQL_DATABASE: masothue_scraper
      MYSQL_USER: scraper
      MYSQL_PASSWORD: scraper_pass
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: [ "CMD", "mysqladmin", "ping", "-h", "localhost" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - mst-network

  # ─── Redis ──────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: mst-redis
    restart: unless-stopped
    volumes:
      - redis-data:/data
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - mst-network

  # ─── Puppeteer Scraper ───────────────────────────────────────────────────
  mst-puppeteer:
    build:
      context: ./puppeteer
    container_name: mst-puppeteer
    restart: unless-stopped
    networks:
      - mst-network
    depends_on:
      - app

volumes:
  mysql-data:
  redis-data:

networks:
  mst-network:
    driver: bridge
